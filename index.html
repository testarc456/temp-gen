<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
  <div class="max-w-6xl mx-auto flex flex-col md:flex-row gap-6">

    <!-- 左：入力欄 -->
    <div class="w-full md:w-1/2 bg-white p-4 rounded shadow">
      <h2 class="text-xl font-bold mb-4">📦 商品情報の入力</h2>

      <!-- 商品カテゴリ -->
      <label class="block mb-2 font-semibold">【商品カテゴリ】</label>
      <div class="mb-4 grid grid-cols-3 gap-2">
        <label class="relative" onclick="toggleCategory(this, '家電・スマホ')">
          <input type="radio" name="category" value="家電・スマホ" class="sr-only peer" />
          <div class="px-3 py-2 bg-gray-100 rounded-full cursor-pointer transition-all duration-200 peer-checked:bg-blue-500 peer-checked:text-white hover:bg-gray-200 peer-checked:hover:bg-blue-600 text-center text-sm">
            📱 家電・スマホ
          </div>
        </label>
        <label class="relative" onclick="toggleCategory(this, 'ファッション')">
          <input type="radio" name="category" value="ファッション" class="sr-only peer" />
          <div class="px-3 py-2 bg-gray-100 rounded-full cursor-pointer transition-all duration-200 peer-checked:bg-blue-500 peer-checked:text-white hover:bg-gray-200 peer-checked:hover:bg-blue-600 text-center text-sm">
            👕 ファッション
          </div>
        </label>
        <label class="relative" onclick="toggleCategory(this, '本・雑誌')">
          <input type="radio" name="category" value="本・雑誌" class="sr-only peer" />
          <div class="px-3 py-2 bg-gray-100 rounded-full cursor-pointer transition-all duration-200 peer-checked:bg-blue-500 peer-checked:text-white hover:bg-gray-200 peer-checked:hover:bg-blue-600 text-center text-sm">
            📚 本・雑誌
          </div>
        </label>
        <label class="relative" onclick="toggleCategory(this, '化粧品・美容')">
          <input type="radio" name="category" value="化粧品・美容" class="sr-only peer" />
          <div class="px-3 py-2 bg-gray-100 rounded-full cursor-pointer transition-all duration-200 peer-checked:bg-blue-500 peer-checked:text-white hover:bg-gray-200 peer-checked:hover:bg-blue-600 text-center text-sm">
            💄 化粧品・美容
          </div>
        </label>
        <label class="relative" onclick="toggleCategory(this, 'ホビー')">
          <input type="radio" name="category" value="ホビー" class="sr-only peer" />
          <div class="px-3 py-2 bg-gray-100 rounded-full cursor-pointer transition-all duration-200 peer-checked:bg-blue-500 peer-checked:text-white hover:bg-gray-200 peer-checked:hover:bg-blue-600 text-center text-sm">
            🎮 ホビー
          </div>
        </label>
        <label class="relative" onclick="toggleCategory(this, 'その他')">
          <input type="radio" name="category" value="その他" class="sr-only peer" />
          <div class="px-3 py-2 bg-gray-100 rounded-full cursor-pointer transition-all duration-200 peer-checked:bg-blue-500 peer-checked:text-white hover:bg-gray-200 peer-checked:hover:bg-blue-600 text-center text-sm">
            📦 その他
          </div>
        </label>
      </div>

      <!-- 商品名 -->
      <label class="block mb-2 font-semibold">【商品名】</label>
      <input id="productName" type="text" placeholder="例：iPhone 14 Pro 256GB スペースブラック" class="w-full border px-3 py-2 mb-4 rounded" />

      <!-- 商品状態（ラジオ） -->
      <label class="block mb-2 font-semibold">【商品状態】</label>
      <div class="mb-4 space-y-2">
        <label><input type="radio" name="condition" value="新品・未使用です" /> 新品・未使用</label><br />
        <label><input type="radio" name="condition" value="美品で、使用回数はごくわずかです" /> 美品（使用わずか）</label><br />
        <label><input type="radio" name="condition" value="使用感はありますが、目立つ傷や汚れはありません" /> やや使用感あり</label><br />
        <label><input type="radio" name="condition" value="全体的に使用感があり、傷や汚れがあります" /> 傷・汚れあり</label>
      </div>

      <!-- 付属品（チェックボックス） -->
      <label class="block mb-2 font-semibold">【付属品】</label>
      <div class="mb-4 space-y-2">
        <label><input type="checkbox" name="items" value="取扱説明書" /> 取扱説明書</label><br />
        <label><input type="checkbox" name="items" value="外箱" /> 外箱</label><br />
        <label><input type="checkbox" name="items" value="保証書" /> 保証書</label><br />
        <label><input type="checkbox" name="items" value="充電ケーブル" /> 充電ケーブル</label><br />
        <label><input type="checkbox" name="items" value="なし" /> 付属品なし</label>
      </div>

      <!-- 返品可否 -->
      <label class="block mb-2 font-semibold">【返品について】</label>
      <div class="mb-4">
        <label class="flex items-center">
          <input type="checkbox" id="returnPolicy" class="mr-2" />
          <span>返品を受け付ける（3日以内、送料購入者負担）</span>
        </label>
        <p class="text-sm text-gray-500 mt-1">※デフォルトは返品不可です</p>
      </div>

      <button onclick="generateTemplate()" class="mt-4 w-full bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">テンプレートを生成する</button>
    </div>

    <!-- 右：出力欄 -->
    <div class="w-full md:w-1/2 bg-white p-4 rounded shadow">
      <h2 class="text-xl font-bold mb-4">📄 出力テンプレート</h2>
      <textarea id="output" class="w-full h-96 border px-3 py-2 rounded font-mono" readonly>ここにテンプレートが表示されます。</textarea>
      <button onclick="copyToClipboard()" class="mt-4 w-full bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">📋 コピーする</button>
    </div>

  </div>

  <script>
    async function generateTemplate() {
      const name = document.getElementById("productName").value.trim();
      const button = document.querySelector('button[onclick="generateTemplate()"]');
      const output = document.getElementById("output");

      if (!name) {
        alert("商品名を入力してください");
        return;
      }

      // 商品状態
      const conditionEl = document.querySelector('input[name="condition"]:checked');
      const condition = conditionEl ? conditionEl.value : "状態は特に記載がありません";

      // 付属品
      const itemEls = document.querySelectorAll('input[name="items"]:checked');
      let items = Array.from(itemEls).map(el => el.value);
      if (items.includes("なし")) {
        items = ["特にございません"];
      }

      // 返品可否
      const returnPolicy = document.getElementById("returnPolicy").checked;

      // 商品カテゴリ
      const categoryEl = document.querySelector('input[name="category"]:checked');
      const category = categoryEl ? categoryEl.value : "";

      // ローディング状態
      button.disabled = true;
      button.textContent = "🤖 AIが生成中...";
      output.value = "AIがテンプレートを生成しています...";

      try {
        const response = await fetch('https://template-generator-api.trasd208.workers.dev', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            productName: name,
            condition: condition,
            items: items,
            returnPolicy: returnPolicy,
            category: category
          })
        });

        const data = await response.json();

        if (data.success) {
          output.value = data.template;
        } else {
          output.value = `エラーが発生しました: ${data.error}`;
        }
      } catch (error) {
        output.value = `通信エラーが発生しました: ${error.message}`;
      } finally {
        button.disabled = false;
        button.textContent = "テンプレートを生成する";
      }
    }

    function toggleCategory(labelElement, value) {
      event.stopPropagation();
      const input = labelElement.querySelector('input[type="radio"]');
      
      if (input.checked) {
        // 既に選択されている場合は解除
        input.checked = false;
      } else {
        // 選択されていない場合は選択
        input.checked = true;
      }
    }

    function copyToClipboard() {
      const text = document.getElementById("output").value;
      navigator.clipboard.writeText(text).then(() => {
        alert("テンプレートをコピーしました！");
      });
    }
  </script>
</body>
</html>
